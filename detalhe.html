<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gráficos - Eventos BH</title>

  <!-- CSS simples -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js (biblioteca externa via CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <header>
    <h1>📊 Gráficos de Eventos em BH</h1>
    <a href="index.html">Voltar</a>
  </header>

  <main style="max-width: 700px; margin: 40px auto;">

    <h2>Eventos por tipo</h2>

    <!-- GRÁFICO -->
    <canvas id="graficoEventos"></canvas>

  </main>

  <!-- Dados -->
  <script src="js/data.js"></script>

  <!-- Script do gráfico -->
  <script>
    // contar tipos de eventos
    let shows = 0;
    let palestras = 0;
    let workshops = 0;

    eventos.forEach(ev => {
      if (ev.tipo === "show") shows++;
      else if (ev.tipo === "palestra") palestras++;
      else if (ev.tipo === "workshop") workshops++;
    });

    // criar gráfico
    const ctx = document.getElementById("graficoEventos");

    new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["Shows", "Palestras", "Workshops"],
        datasets: [{
          label: "Quantidade de eventos",
          data: [shows, palestras, workshops]
        }]
      }
    });
  </script>

</body>
</html>
